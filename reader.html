<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Ebook Reader</title><script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script><style>:root{--bg:#0f172a;--panel:#111827;--line:#243244;--text:#e5e7eb;--muted:#94a3b8;--accent:#8b5cf6}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:Inter,system-ui,Segoe UI,Roboto,Arial,sans-serif}.topbar{position:sticky;top:0;z-index:20;display:flex;gap:10px;align-items:center;justify-content:space-between;padding:12px 16px;background:rgba(15,23,42,.96);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}.title-wrap h1{margin:0;font-size:18px}.title-wrap p{margin:4px 0 0;color:var(--muted);font-size:12px}.controls{display:flex;gap:8px;flex-wrap:wrap}button,a.btn{border:1px solid var(--line);background:var(--panel);color:var(--text);padding:10px 12px;border-radius:12px;cursor:pointer;text-decoration:none;font-weight:700;font-size:13px}button:hover,a.btn:hover{border-color:var(--accent)}#frameWrap,#epubWrap{height:calc(100vh - 74px)}#pdfFrame{width:100%;height:100%;border:0;background:#fff}#viewer{width:100%;height:100%}.hidden{display:none}.msg{padding:24px;color:var(--muted)}</style></head><body><div class="topbar"><div class="title-wrap"><h1 id="bookTitle">Ebook Reader</h1><p id="bookMeta">Open PDFs in the browser or EPUBs in the built-in reader.</p></div><div class="controls"><button id="prevBtn" class="hidden">Prev</button><button id="nextBtn" class="hidden">Next</button><a id="sourceBtn" class="btn" href="#" target="_blank" rel="noopener noreferrer">Open Source</a></div></div><div id="frameWrap" class="hidden"><iframe id="pdfFrame"></iframe></div><div id="epubWrap" class="hidden"><div id="viewer"></div></div><div id="message" class="msg">No book URL supplied.</div><script>const params=new URLSearchParams(location.search);const url=params.get('url');const title=params.get('title')||'Ebook Reader';document.getElementById('bookTitle').textContent=title;document.getElementById('sourceBtn').href=url||'#';function extOf(u){try{const p=new URL(u,location.href).pathname.toLowerCase();if(p.endsWith('.pdf'))return 'pdf';if(p.endsWith('.epub'))return 'epub';return '';}catch(e){return '';}}const ext=url?extOf(url):'';const frameWrap=document.getElementById('frameWrap');const epubWrap=document.getElementById('epubWrap');const message=document.getElementById('message');const prevBtn=document.getElementById('prevBtn');const nextBtn=document.getElementById('nextBtn');if(!url){message.textContent='No book URL supplied.';}else if(ext==='pdf'){frameWrap.classList.remove('hidden');message.classList.add('hidden');document.getElementById('bookMeta').textContent='PDF loaded in browser view.';document.getElementById('pdfFrame').src=url;}else if(ext==='epub'){epubWrap.classList.remove('hidden');message.classList.add('hidden');prevBtn.classList.remove('hidden');nextBtn.classList.remove('hidden');document.getElementById('bookMeta').textContent='EPUB loaded in built-in reader.';const book=ePub(url);const rendition=book.renderTo("viewer",{width:"100%",height:"100%"});rendition.display();prevBtn.onclick=()=>rendition.prev();nextBtn.onclick=()=>rendition.next();}else{message.innerHTML='This link is not a direct PDF/EPUB URL.<br><br>Use <strong>Open Source</strong> or save a direct file link for in-app reading.';}</script></body></html>
